<table mat-table [dataSource]="jobs">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>Job ID</th>
    <td mat-cell *matCellDef="let job">
      @if (job.status.toLowerCase() === 'completed') {
        <button mat-button color="primary" (click)="getDetails(job)">{{job.id}}</button>
      }
      @else {
        <span>{{ job.id }}</span>
      }

    </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let job">{{ job.status }}</td>
  </ng-container>

  <ng-container matColumnDef="contentType">
    <th mat-header-cell *matHeaderCellDef>ContentType</th>
    <td mat-cell *matCellDef="let job">{{ job.contentType }}</td>
  </ng-container>

  <ng-container matColumnDef="totalRows">
    <th mat-header-cell *matHeaderCellDef>Total Rows</th>
    <td mat-cell *matCellDef="let job">{{ job.totalRows }}</td>
  </ng-container>

  <ng-container matColumnDef="totalCompleted">
    <th mat-header-cell *matHeaderCellDef>Completed</th>
    <td mat-cell *matCellDef="let job">{{ job.totalCompleted }}</td>
  </ng-container>

  <ng-container matColumnDef="totalInvalid">
    <th mat-header-cell *matHeaderCellDef>Invalid</th>
    <td mat-cell *matCellDef="let job">{{ job.totalInvalid }}</td>
  </ng-container>

  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef>Created At</th>
    <td mat-cell *matCellDef="let job">{{ job.createdAt }}</td>
  </ng-container>

  <ng-container matColumnDef="updatedAt">
    <th mat-header-cell *matHeaderCellDef>Updated At</th>
    <td mat-cell *matCellDef="let job">{{ job.updatedAt }}</td>
  </ng-container>


  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
