AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless File Processor

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    Layers:
      - !Ref DependenciesLayer
    Environment:
      Variables:
        BUCKET_NAME: !Ref FileProcessorBucket
        QUEUE_URL: !Ref FileProcessorQueue
        TABLE_NAME: !Ref FileProcessorTable

Resources:

  # Lambda Layer - shared dependencies
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: serverless-file-processor-dependencies
      ContentUri: layers/dependencies/
      CompatibleRuntimes:
        - nodejs20.x
    Metadata:
      BuildMethod: nodejs20.x

  # S3 Bucket
  FileProcessorBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - 'http://localhost:4200'
            AllowedMethods:
              - PUT
              - GET
            AllowedHeaders:
              - '*'
            MaxAge: 3000

  # Dead Letter Queue
  FileProcessorDLQ:
    Type: AWS::SQS::Queue

  # SQS Queue
  FileProcessorQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FileProcessorDLQ.Arn
        maxReceiveCount: 3

  # DynamoDB Table
  FileProcessorTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # API Gateway
  FileProcessorApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'http://localhost:4200'"
        AllowHeaders: "'Content-Type,Authorization,x-cor-id'"
        AllowMethods: "'GET,PUT,OPTIONS'"

  # Uploader Lambda - generates a presigned S3 URL
  UploaderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.upload
      Policies:
        - S3WritePolicy:
            BucketName: !Ref FileProcessorBucket
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref FileProcessorApi
            Path: /upload
            Method: GET

  # Mapper Lambda - triggered when a file is uploaded to S3
  MapperFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.map
      Timeout: 900
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref FileProcessorBucket
        - DynamoDBWritePolicy:
            TableName: !Ref FileProcessorTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt FileProcessorQueue.QueueName
      Events:
        S3ObjectCreated:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref FileProcessorBucket
                object:
                  size:
                    - numeric:
                      - ">"
                      - 0

  # Get Job Results Lambda - returns aggregated results for a job
  GetJobResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.getJobResults
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileProcessorTable
      Events:
        GetJobResults:
          Type: Api
          Properties:
            RestApiId: !Ref FileProcessorApi
            Path: /jobs/{id}/result
            Method: GET

  # Get Jobs Lambda - returns all jobs
  GetJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.getJobs
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileProcessorTable
      Events:
        GetJobs:
          Type: Api
          Properties:
            RestApiId: !Ref FileProcessorApi
            Path: /jobs
            Method: GET

  # Reducer Lambda - processes rows from SQS queue
  ReducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.reduce
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FileProcessorTable
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt FileProcessorQueue.Arn
            BatchSize: 10

Outputs:
  ApiUrl:
    Value: !Sub 'https://${FileProcessorApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  BucketName:
    Value: !Ref FileProcessorBucket
  QueueUrl:
    Value: !Ref FileProcessorQueue
  DLQUrl:
    Value: !Ref FileProcessorDLQ
  TableName:
    Value: !Ref FileProcessorTable

